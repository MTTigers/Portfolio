function buildLeafDefinitions(nodes, ancestors = [], leaves = []) {
  nodes.forEach((node) => {
    if (node.type === "group") {
      buildLeafDefinitions(node.children || [], [...ancestors, node.id], leaves);
    } else if (node.pageId) {
      leaves.push({ ...node, ancestors });
    }
  });
  return leaves;
}

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function getActiveLeafId() {
  const definition = pageDefinitions[state.activePage];
  return definition ? definition.sidebarId || null : null;
}

function getActiveSidebarPath() {
  const activeLeafId = getActiveLeafId();
  if (!activeLeafId) {
    return new Set();
  }
  const match = leafDefinitions.find((leaf) => leaf.id === activeLeafId);
  if (!match) {
    return new Set([activeLeafId]);
  }
  return new Set([...match.ancestors, activeLeafId]);
}

function openSidebarPath(pageId) {
  const definition = pageDefinitions[pageId];
  if (!definition || !definition.sidebarId) return;
  const leaf = leafDefinitions.find((item) => item.id === definition.sidebarId);
  if (!leaf) return;
  leaf.ancestors.forEach((ancestor) => state.openSidebarGroups.add(ancestor));
}

function renderDrawerSlot() {
  if (!app.dataset.shellReady) return;
  const slot = app.querySelector("[data-slot='drawer-layer']");
  if (slot) {
    slot.innerHTML = renderDrawerLayer();
    if (typeof syncInlineFormLabelWidths === "function") syncInlineFormLabelWidths();
  }
}

function renderBatchPartSlot() {
  const frame = app.querySelector(".batch-table-frame");
  const scrollLeft = frame ? frame.scrollLeft : 0;
  const scrollTop = frame ? frame.scrollTop : 0;
  renderDrawerSlot();
  const nextFrame = app.querySelector(".batch-table-frame");
  if (nextFrame) {
    nextFrame.scrollLeft = scrollLeft;
    nextFrame.scrollTop = scrollTop;
  }
}

function syncBatchPartSelectedRow() {
  const rows = app.querySelectorAll(".batch-part-table tbody tr[data-batch-row]");
  rows.forEach((row) => {
    row.classList.toggle("selected", Number(row.dataset.batchRow) === state.batchPartSelectedRow);
  });
}

function renderSidebarNav(activePath) {
  return sidebarTree.map((node) => renderSidebarNode(node, activePath, 0)).join("");
}

function renderSidebarNode(node, activePath, level) {
  if (node.type === "group") {
    const isOpen = state.openSidebarGroups.has(node.id);
    const isActive = activePath.has(node.id) && activePath.has(getActiveLeafId());
    const rowClass = `sidebar-row${isActive ? " active" : ""}`;

    return `
      <div class="sidebar-section">
        <button class="${rowClass}" data-action="toggle-sidebar-group" data-id="${node.id}">
          ${icon(node.icon || "tree", "icon-20")}
          <span class="label">${escapeHtml(node.label)}</span>
          <span class="sidebar-group-chevron">${icon(isOpen ? "chevronDown" : "chevronRight", "icon-16")}</span>
        </button>
        <div class="sidebar-children ${isOpen ? "" : "hidden"}">
          ${(node.children || []).map((child) => renderSidebarNode(child, activePath, level + 1)).join("")}
        </div>
      </div>
    `;
  }

function getDeletedRows(pageKey) {
  if (!state.deletedRows) state.deletedRows = {};
  if (!Object.prototype.hasOwnProperty.call(state.deletedRows, pageKey)) {
    state.deletedRows[pageKey] = new Set();
  }
  return state.deletedRows[pageKey];
}

function filterDeletedRows(pageKey, rows) {
  const deletedRows = getDeletedRows(pageKey);
  return rows.filter((row) => !deletedRows.has(row.id));
}

function getProductListRows(pageKey) {
  return filterDeletedRows(pageKey, productRows);
}

function getDrawerAttachmentRows() {
  return filterDeletedRows("drawerAttachments", drawerAttachmentRows);

function getDeleteConfirmCount(confirm = state.deleteConfirm) {
  if (!confirm) return 0;
  if (confirm.type === "drawer") return state.drawerCheckedRows.size;
  if (confirm.type === "batchPart") return state.batchPartCheckedRows.size;
  if (confirm.type === "validity") return state.checkedRows.validityManagement?.size || 0;
  if (confirm.type === "table") return state.checkedRows[confirm.pageKey]?.size || 0;
  return 0;
}

function getDeleteConfirmObjectLabel(confirm = state.deleteConfirm) {
  if (!confirm) return "数据";
  if (confirm.type === "drawer") return "附件";
  if (confirm.type === "batchPart") return "部件记录";

function confirmDeleteSelection() {
  const confirm = state.deleteConfirm;
  if (!confirm) return;

  if (confirm.type === "validity") {
    const deletedIds = new Set(state.checkedRows.validityManagement);
    state.validityRows = state.validityRows.filter((row) => !deletedIds.has(row.id));
    state.checkedRows.validityManagement = new Set();
    if (deletedIds.has(state.selectedRows.validityManagement)) {
      state.selectedRows.validityManagement = null;
    }
  } else if (confirm.type === "drawer") {
    const deletedIds = new Set(state.drawerCheckedRows);
    const deletedRows = getDeletedRows("drawerAttachments");
    deletedIds.forEach((rowId) => deletedRows.add(rowId));
    state.drawerCheckedRows.clear();
    if (deletedIds.has(state.drawerSelectedRow)) {
      state.drawerSelectedRow = null;
    }
  } else if (confirm.type === "batchPart") {
    const deletedRows = new Set(state.batchPartCheckedRows);
    deletedRows.forEach((rowIndex) => state.batchPartDeletedRows.add(rowIndex));
    state.batchPartCheckedRows = new Set();
    if (deletedRows.has(state.batchPartSelectedRow)) {
      state.batchPartSelectedRow = null;
    }
    if (state.batchPartOpenSelect) {
      const openRow = Number(String(state.batchPartOpenSelect).split(":")[0]);
      if (deletedRows.has(openRow)) state.batchPartOpenSelect = null;
    }
    if (state.batchPartOpenPicker) {
      const openRow = Number(String(state.batchPartOpenPicker).split(":")[0]);
      if (deletedRows.has(openRow)) state.batchPartOpenPicker = null;
    }
  } else if (confirm.type === "table") {
    const deletedIds = new Set(state.checkedRows[confirm.pageKey] || []);
    const deletedRows = getDeletedRows(confirm.pageKey);
    deletedIds.forEach((rowId) => deletedRows.add(rowId));
    state.checkedRows[confirm.pageKey]?.clear();
    if (deletedIds.has(state.selectedRows[confirm.pageKey])) {
      state.selectedRows[confirm.pageKey] = null;
    }
    if (confirm.pageKey === "galleryLibrary" && deletedIds.has(state.phmSelectedMediaId)) {
      state.phmSelectedMediaId = null;
    }
  }

  state.deleteConfirm = null;
  state.validityDeleteDialogOpen = false;
}

    const pageKey = actionTarget.dataset.pageKey || "default";

    state.paginationPageSizes[pageKey] = pageSize;
    state.openPaginationPageSize = null;

    render();

    state.typeAttributeOpenSelect = null;
    renderCache.content = "";
    render();
    return;
  }

  if (action === "switch-type-attr-side-panel") {
    event.stopPropagation();
    state.typeAttributeSidePanel = actionTarget.dataset.panelId || "constraints";
    state.typeAttributeOpenSelect = null;
    renderCache.content = "";
    render();
    return;
  }

  if (action === "toggle-type-attr-select") {
    event.stopPropagation();
    const selectId = actionTarget.dataset.selectId;
    state.typeAttributeOpenSelect = state.typeAttributeOpenSelect === selectId ? null : selectId;
    renderCache.content = "";
    render();
    return;
  }

  if (action === "choose-type-attr-option") {
    event.stopPropagation();
    const rowId = Number(actionTarget.dataset.rowId);
    const field = actionTarget.dataset.field;
    const value = actionTarget.dataset.value || "";
    if (Number.isFinite(rowId) && field) {
      state.typeAttributeRuleValues[`${rowId}:${field}`] = value;
    }
    state.typeAttributeOpenSelect = null;
    renderCache.content = "";
    render();
    return;
  }

  if (action === "open-product-object-detail") {
    event.stopPropagation();
    const rowId = Number(actionTarget.dataset.rowId);
    const row = productRows.find((item) => item.id === rowId) || productRows[1] || productRows[0];
    if (row) {
      state.productObjectRowId = row.id;
      pageDefinitions.productObjectDetail.label = row.name;
    }
    if (!state.pageTabs.includes("productObjectDetail")) {
      state.pageTabs.push("productObjectDetail");
    }
    state.activePage = "productObjectDetail";
    state.productObjectActiveTab = "structure";
    state.productObjectSidePanel = "attributes";
    state.productObjectFilterMenuOpen = false;
    state.productObjectActionMenuOpen = false;
    state.productStructureSelectedId = null;
    render();
    return;
  }

  if (action === "switch-product-object-tab") {
    state.productObjectActiveTab = actionTarget.dataset.tabId || "structure";
    state.productObjectFilterMenuOpen = false;
    state.productObjectActionMenuOpen = false;
    renderCache.content = "";
    render();
    return;
  }

  if (action === "switch-product-object-side-panel") {
    event.stopPropagation();
    state.productObjectSidePanel = actionTarget.dataset.panelId || "attributes";
    renderCache.content = "";
    render();
    return;
  }

  if (action === "switch-view-attr-tab") {
    state.viewAttributeActiveTab = actionTarget.dataset.tabId || "config";
    state.viewAttributeOpenSelect = null;
    renderCache.content = "";
    render();
    return;
  }

  if (action === "switch-view-attr-side-panel") {
    event.stopPropagation();
    state.viewAttributeSidePanel = actionTarget.dataset.panelId || "basic";
    state.viewAttributeOpenSelect = null;
    renderCache.content = "";
    render();
    return;
  }

  if (action === "toggle-view-attr-select") {
    event.stopPropagation();
    const selectId = actionTarget.dataset.selectId;
    state.viewAttributeOpenSelect = state.viewAttributeOpenSelect === selectId ? null : selectId;
    renderCache.content = "";
    render();
    return;
  }

  if (action === "choose-view-attr-option") {
    event.stopPropagation();
    const fieldKey = actionTarget.dataset.fieldKey;
    const value = actionTarget.dataset.value || "";
    if (fieldKey) {
      state.viewAttributeFieldValues[fieldKey] = value;
    }
    state.viewAttributeOpenSelect = null;
    renderCache.content = "";
    render();
    return;
  }

  if (action === "toggle-product-object-filter-menu") {
    event.stopPropagation();
    state.productObjectFilterMenuOpen = !state.productObjectFilterMenuOpen;
    state.productObjectActionMenuOpen = false;
    renderCache.content = "";
    render();
    return;
  }

  if (action === "toggle-product-object-action-menu") {
    event.stopPropagation();
    state.productObjectActionMenuOpen = !state.productObjectActionMenuOpen;
    state.productObjectFilterMenuOpen = false;
    renderCache.content = "";
    render();
    return;
  }

  if (action === "product-object-action-command") {
    event.stopPropagation();
    state.productObjectActionMenuOpen = false;
    renderCache.content = "";
    render();
    return;
  }

  if (action === "select-product-structure-row") {
    state.productStructureSelectedId = actionTarget.dataset.rowId || "root";
    renderCache.content = "";
    render();
    return;
  }

  if (action === "close-page-tab") {
    event.stopPropagation();
    const pageId = actionTarget.dataset.pageId;
    if (pageDefinitions[pageId] && pageDefinitions[pageId].closable) {
      const currentIndex = state.pageTabs.indexOf(pageId);
      state.pageTabs = state.pageTabs.filter((tabId) => tabId !== pageId);
      if (state.activePage === pageId) {
        const nextActive =
          state.pageTabs[currentIndex] ||
          state.pageTabs[currentIndex - 1] ||
          "home";
        state.activePage = nextActive;
        openSidebarPath(state.activePage);
      }
      render();
    }
    return;
  }

  if (action === "activate-page-tab") {
    state.activePage = actionTarget.dataset.pageId;
    openSidebarPath(state.activePage);
    render();
    return;
  }

  if (action === "open-page-tab") {
    const pageId = actionTarget.dataset.pageId;
    if (!pageId) return;
    if (!state.pageTabs.includes(pageId)) {
      state.pageTabs.push(pageId);
    }
    state.activePage = pageId;
    if (pageId === "productManagement") {
      state.activeInnerTab = "folders";
    }
    openSidebarPath(pageId);
    render();
    return;
  }

  if (action === "toggle-sidebar-group") {
    const groupId = actionTarget.dataset.id;
    if (state.openSidebarGroups.has(groupId)) {
      state.openSidebarGroups.delete(groupId);
    } else {
      state.openSidebarGroups.add(groupId);
    }
    render();
    return;
  }

  if (action === "activate-inner-tab") {
    state.activeInnerTab = actionTarget.dataset.tabId;
    state.partMenuOpen = false;
    state.productManagementMoreMenuOpen = false;
    render();
    return;
  }

  if (action === "toggle-detail-group") {
    const groupId = actionTarget.dataset.id;
    state.selectedDetailNode = groupId;
    if (state.openDetailGroups.has(groupId)) {
      state.openDetailGroups.delete(groupId);
    } else {
      state.openDetailGroups.add(groupId);
    }
    render();
    return;
  }

  if (action === "select-detail-node") {
    state.selectedDetailNode = actionTarget.dataset.id;
    render();
    return;
  }

  if (action === "toggle-checkbox") {
    event.stopPropagation();
    const pageKey = actionTarget.dataset.pageKey;
    const rowId = Number(actionTarget.dataset.rowId);
    const checkedSet = state.checkedRows[pageKey];
    if (checkedSet.has(rowId)) {
      checkedSet.delete(rowId);
    } else {
      checkedSet.add(rowId);
    }
    render();
    return;
  }

  if (action === "toggle-all-checkbox") {
    event.stopPropagation();
    const pageKey = actionTarget.dataset.pageKey;
    const checkedSet = state.checkedRows[pageKey];
    if (!checkedSet) return;
    const rowIds = getTableRowIds(pageKey);
    const shouldCheckAll = !rowIds.every((rowId) => checkedSet.has(rowId));
    checkedSet.clear();
    if (shouldCheckAll) {
      rowIds.forEach((rowId) => checkedSet.add(rowId));
    }
    render();
    return;
  }

  if (action === "delete-table-selected") {
    event.stopPropagation();
    const pageKey = actionTarget.dataset.pageKey;
    const checkedSet = state.checkedRows[pageKey];
    if (!checkedSet || checkedSet.size === 0) return;
    state.deleteConfirm = { type: "table", pageKey };
    render();
    return;
  }

  if (action === "cancel-delete-confirm") {
    event.stopPropagation();
    state.deleteConfirm = null;
    render();
    return;
  }

  if (action === "confirm-delete-selected") {
    event.stopPropagation();
    confirmDeleteSelection();
    render();
    return;
  }

  if (action === "select-row") {
    const pageKey = actionTarget.dataset.pageKey;
    const rowId = Number(actionTarget.dataset.rowId);
    state.selectedRows[pageKey] = rowId;
    if (pageKey === "viewAttributeConfig") {
      state.viewAttributeOpenSelect = null;
    }
    if (pageKey === "typeAttributeAttributes") {
      state.selectedRows.typeAttributeRelatedAttributes = null;
      state.checkedRows.typeAttributeRelatedAttributes?.clear();
    }
    render();
  }
});

document.addEventListener("click", (event) => {
  const actionTarget = event.target.closest("[data-action]");
  if (!actionTarget) return;

  const { action } = actionTarget.dataset;

  if (action === "open-drawer") {
    state.drawerOpen = true;
    renderDrawerSlot();
    return;
  }

  if (action === "close-drawer") {
    state.drawerOpen = false;
    renderDrawerSlot();
    return;
  }

  if (action === "toggle-drawer-checkbox") {
    event.stopPropagation();
    const rowId = Number(actionTarget.dataset.rowId);
    if (state.drawerCheckedRows.has(rowId)) {
      state.drawerCheckedRows.delete(rowId);
    } else {
      state.drawerCheckedRows.add(rowId);
    }
    state.drawerSelectedRow = rowId;
    renderDrawerSlot();
    return;
  }

  if (action === "toggle-drawer-all-checkbox") {
    event.stopPropagation();
    const rows = getDrawerAttachmentRows();
    const allChecked = rows.length > 0 && rows.every((row) => state.drawerCheckedRows.has(row.id));
    if (allChecked) {
      rows.forEach((row) => state.drawerCheckedRows.delete(row.id));
    } else {
      rows.forEach((row) => state.drawerCheckedRows.add(row.id));
    }
    renderDrawerSlot();
    return;
  }

  if (action === "delete-drawer-selected") {
    event.stopPropagation();
    if (state.drawerCheckedRows.size === 0) return;
    state.deleteConfirm = { type: "drawer" };
    renderDrawerSlot();
    return;
  }

  if (action === "select-drawer-row") {
    state.drawerSelectedRow = Number(actionTarget.dataset.rowId);
    renderDrawerSlot();
  }
});

function createValidityDraft(source = {}) {
  const contextNo = source.contextNo || "";
  const hasContext = Boolean(contextNo.trim());
  const type = hasContext ? source.type || "批号" : "日期";
  return {
    contextNo,
    contextName: source.contextName || getValidityContextName(contextNo),
    type,
    qualifier: source.qualifier || "精确",
    range: source.range || ""
  };
}

function ensureValidityState() {
  if (!innerTabs.some((tab) => tab.id === "validity")) {
    innerTabs.splice(1, 0, { id: "validity", label: "有效性" });
  }

  if (state.activeInnerTab === "team") {
    state.activeInnerTab = "folders";
  }

  if (!Object.prototype.hasOwnProperty.call(state.selectedRows, "validityManagement")) {
    state.selectedRows.validityManagement = null;
  }

  if (!Object.prototype.hasOwnProperty.call(state.checkedRows, "validityManagement")) {
    state.checkedRows.validityManagement = new Set();
  }

  if (!Array.isArray(state.validityRows)) {
    state.validityRows = validitySeedRows.map((row) => ({ ...row }));
  }

  if (!state.validitySort) {
    state.validitySort = { key: "addedAt", order: "desc" };
  }

  if (typeof state.validityDrawerOpen !== "boolean") {
    state.validityDrawerOpen = false;
  }

  if (!state.validityDrawerMode) {
    state.validityDrawerMode = "add";
  }

  if (!Object.prototype.hasOwnProperty.call(state, "validityEditingId")) {
    state.validityEditingId = null;
  }

  if (!state.validityDraft) {
    state.validityDraft = createValidityDraft();
  }

  if (typeof state.validityDeleteDialogOpen !== "boolean") {
    state.validityDeleteDialogOpen = false;
  }

  if (typeof state.validityFormError !== "string") {
    state.validityFormError = "";
  }

  if (!Object.prototype.hasOwnProperty.call(state, "validityOpenSelect")) {
    state.validityOpenSelect = null;
  }

}

function getValidityContextName(contextNo) {
  const normalized = String(contextNo || "").trim();
  if (!normalized) return "";
  return validityContextNameMap[normalized] || "上下文部件";
}

function getValidityTypeOptions(contextNo) {
  if (!String(contextNo || "").trim()) {
    return ["日期"];
  }

  return ["日期", "批号", "序列号", "批号/序列号"];
}

function normalizeValidityDraft(draft) {
  const normalized = {
    contextNo: String(draft.contextNo || "").trim(),
    contextName: String(draft.contextName || "").trim(),
    type: String(draft.type || "").trim(),
    qualifier: String(draft.qualifier || "").trim(),
    range: String(draft.range || "").trim()
  };

  if (!normalized.contextNo) {
    normalized.type = "日期";
  }

  if (!getValidityTypeOptions(normalized.contextNo).includes(normalized.type)) {
    normalized.type = getValidityTypeOptions(normalized.contextNo)[0];
  }

  if (!normalized.contextName && normalized.contextNo) {
    normalized.contextName = getValidityContextName(normalized.contextNo);
  }

  if (normalized.type !== "日期") {
    normalized.qualifier = "精确";
  } else if (!normalized.qualifier) {
    normalized.qualifier = "精确";
  }

  return normalized;
}

function getSortedValidityRows() {
  ensureValidityState();
  const { key, order } = state.validitySort;
  const rows = [...state.validityRows];
  const factor = order === "asc" ? 1 : -1;

  rows.sort((left, right) => {
    const leftValue = String(left[key] || "");
    const rightValue = String(right[key] || "");
    return leftValue.localeCompare(rightValue, "zh-CN", { numeric: true }) * factor;
  });

  return rows;
}

function getValidityRowsSignature() {
  ensureValidityState();

      contextNo: row.contextNo,
      type: row.type,

  );
}

function getBatchPartValue(rowIndex, column) {
  const cellKey = `${rowIndex}:${column.key}`;
  if (Object.prototype.hasOwnProperty.call(state.batchPartValues, cellKey)) {
    return state.batchPartValues[cellKey];
  }

  if (column.key === "name") {
    return rowIndex === 0 ? "" : rowIndex === 3 ? "此处显示部件名称" : "部件名称";
  }
  if (column.key === "number") return "已生成";
  if (column.key === "security") return rowIndex === 0 || rowIndex > 2 ? "非密" : "秘密";
  if (column.key === "assemblyMode") return rowIndex === 1 ? "不可分" : "可分";
  if (column.key === "source") return "制造";
  if (column.key === "unit") return "个";
  if (column.key === "location") return "/000";
  if (column.key === "material") return rowIndex % 3 === 0 ? "" : "M-REACH-001";
  if (column.key === "effectiveAt") return rowIndex % 4 === 0 ? "" : "2026-04-28";
  if (column.type === "select") return "默认";
  return "";
}

function getBatchDateParts(value) {
  const match = String(value || "").match(/^(\d{4})-(\d{2})-(\d{2})$/);
  const fallback = new Date(2026, 3, 1);
  if (!match) {
    return {
      year: fallback.getFullYear(),
      month: fallback.getMonth(),
      day: null
    };
  }

  return {
    year: Number(match[1]),
    month: Number(match[2]) - 1,
    day: Number(match[3])
  };
}

function formatBatchDate(year, month, day) {
  return `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
}

function renderBatchDatePanel(rowIndex, column, value) {
  const { year, month, day } = getBatchDateParts(value);
  const firstWeekday = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const cells = [];

  for (let index = 0; index < firstWeekday; index += 1) {
    cells.push('<span class="batch-date-cell empty"></span>');
  }

  for (let currentDay = 1; currentDay <= daysInMonth; currentDay += 1) {
    const dateValue = formatBatchDate(year, month, currentDay);
    cells.push(`
      <button
        class="batch-date-cell${currentDay === day ? " selected" : ""}"
        type="button"
        data-action="choose-batch-cell-date"
        data-batch-row="${rowIndex}"
        data-batch-field="${column.key}"
        data-batch-value="${dateValue}"
      >${currentDay}</button>
    `);
  }

  return `
    <span class="batch-date-panel" role="dialog" aria-label="${escapeHtml(column.label)}">
      <span class="batch-date-header">${year}年${month + 1}月</span>
      <span class="batch-date-weekdays">
        ${["日", "一", "二", "三", "四", "五", "六"].map((item) => `<span>${item}</span>`).join("")}
      </span>
      <span class="batch-date-grid">${cells.join("")}</span>
    </span>
  `;
}

function renderBatchPartCell(rowIndex, column) {
  const value = getBatchPartValue(rowIndex, column);
  const cellKey = `${rowIndex}:${column.key}`;
  const invalid = column.required && !value && (state.batchPartSubmitAttempted || state.batchPartTouchedCells.has(cellKey));
  const displayValue = value || "";

  if (column.type === "readonly") {
    return `<span class="batch-cell-readonly">${escapeHtml(displayValue)}</span>`;
  }

  if (column.type === "select") {
    const isOpen = state.batchPartOpenSelect === cellKey;
    return `
      <span class="batch-cell-display">${escapeHtml(displayValue)}</span>
      <span class="batch-cell-editor${invalid ? " invalid" : ""}">
        <span class="batch-inline-select${isOpen ? " open" : ""}">
          <button
            class="batch-select-trigger"
            type="button"
            aria-label="${escapeHtml(column.label)}"
            data-action="toggle-batch-cell-select"
            data-batch-row="${rowIndex}"
            data-batch-field="${column.key}"
          >
            <span>${escapeHtml(value || "请选择")}</span>
            ${dropdownArrow("batch-select-chevron")}
          </button>
          ${
            isOpen
              ? `
                <span class="batch-select-menu" role="listbox">
                  ${(column.options || [])
                    .map(
                      (option) => `
                        <button
                          class="batch-inline-option${option === value ? " selected" : ""}"
                          type="button"
                          role="option"
                          aria-selected="${option === value ? "true" : "false"}"
                          data-action="choose-batch-cell-option"
                          data-batch-row="${rowIndex}"
                          data-batch-field="${column.key}"
                          data-batch-value="${escapeHtml(option)}"
                        >${escapeHtml(option)}</button>
                      `
                    )
                    .join("")}
                </span>
              `
              : ""
          }
        </span>
      </span>
    `;
  }

  if (column.type === "search") {
    return `
      <span class="batch-cell-display">${escapeHtml(displayValue)}</span>
      <span class="batch-cell-editor${invalid ? " invalid" : ""}">
        <span class="batch-search-input">
          <input type="text" value="${escapeHtml(value)}" aria-label="${escapeHtml(column.label)}" data-batch-row="${rowIndex}" data-batch-field="${column.key}" />
          ${icon("search", "icon-16")}
        </span>
      </span>
    `;
  }

  if (column.type === "time") {
    const isOpen = state.batchPartOpenPicker === cellKey;
    return `
      <span class="batch-cell-display">${escapeHtml(displayValue)}</span>
      <span class="batch-cell-editor${invalid ? " invalid" : ""}">
        <span class="batch-picker-input${isOpen ? " open" : ""}">
          <button
            class="batch-picker-trigger"
            type="button"
            aria-label="${escapeHtml(column.label)}"
            data-action="toggle-batch-cell-date"
            data-batch-row="${rowIndex}"
            data-batch-field="${column.key}"
          >
            <span class="${value ? "" : "placeholder"}">${escapeHtml(value || "请选择日期")}</span>
          </button>
          <span class="batch-calendar-icon" aria-hidden="true"></span>
          ${isOpen ? renderBatchDatePanel(rowIndex, column, value) : ""}
        </span>
      </span>
    `;
  }

  return `
    <span class="batch-cell-display">${escapeHtml(displayValue)}</span>
    <span class="batch-cell-editor${invalid ? " invalid" : ""}">
      <input type="text" value="${escapeHtml(value)}" aria-label="${escapeHtml(column.label)}" data-batch-row="${rowIndex}" data-batch-field="${column.key}" />
    </span>
    ${invalid ? '<span class="batch-cell-error">必填项不能为空</span>' : ""}
  `;
}

function renderDrawerLayer() {

  let layer = "";

  const backdropAction = hasDeleteConfirm
    ? "cancel-delete-confirm"
    : state.validityDeleteDialogOpen
      ? "cancel-validity-delete"
    : state.validityDrawerOpen
      ? "close-validity-drawer"
      : state.batchPartDialogOpen
        ? "close-batch-part-dialog"
        : "close-drawer";

  if (hasOverlay) {
    layer = `
      <div class="drawer-layer open">
        <div class="drawer-backdrop" data-action="${backdropAction}"></div>
        ${state.drawerOpen ? renderDocumentDrawerShell() : ""}
        ${state.batchPartDialogOpen ? renderBatchPartDialog() : ""}

        ${state.validityDeleteDialogOpen ? renderValidityDeleteDialog() : ""}
        ${hasDeleteConfirm ? renderDeleteConfirmDialog() : ""}

    `;
  }

  if (state.phmOverlay) {
    layer += renderPhmOverlay();
  }

  return layer;
}

function resetValidityDraft() {
  state.validityDraft = createValidityDraft();
  state.validityFormError = "";
  state.validityOpenSelect = null;
}

function openValidityDrawer(mode, rowId = null) {
  ensureValidityState();
  state.drawerOpen = false;
  state.validityDeleteDialogOpen = false;
  state.validityDrawerOpen = true;
  state.validityDrawerMode = mode;
  state.validityEditingId = rowId;
  state.validityFormError = "";
  state.validityOpenSelect = null;

  if (mode === "edit") {
    const row = state.validityRows.find((item) => item.id === rowId);
    state.validityDraft = createValidityDraft(row || {});
  } else {
    resetValidityDraft();
  }
}

function saveValidityDraft() {
  ensureValidityState();
  const draft = normalizeValidityDraft(state.validityDraft);
  const duplicated = state.validityRows.some((row) => {
    if (state.validityDrawerMode === "edit" && row.id === state.validityEditingId) {
      return false;
    }

    return (
      row.contextNo === draft.contextNo &&
      row.type === draft.type &&
      row.qualifier === draft.qualifier &&
      row.range === draft.range
    );
  });

  if (!draft.type) {
    state.validityFormError = "类型为必填项";
    return false;
  }

  if (!draft.range) {
    state.validityFormError = "范围为必填项";
    return false;
  }

  if (draft.range.length > 200) {
    state.validityFormError = "范围限定输入200字符";
    return false;
  }

  if (/[\u4e00-\u9fff]/.test(draft.range)) {
    state.validityFormError = "范围不支持中文";
    return false;
  }

  if (!draft.contextNo && draft.type !== "日期") {
    state.validityFormError = "未选择上下文编号时，类型只能为日期";
    return false;
  }

  if (duplicated) {
    state.validityFormError = "已存在相同有效性";
    return false;
  }

  if (state.validityDrawerMode === "edit") {
    state.validityRows = state.validityRows.map((row) =>
      row.id === state.validityEditingId
        ? {
            ...row,
            type: draft.type,
            qualifier: draft.qualifier,
            range: draft.range
          }
        : row
    );
  } else {
    const nextId = state.validityRows.reduce((maxId, row) => Math.max(maxId, row.id), 0) + 1;
    state.validityRows = [
      {
        id: nextId,
        no: "YY08324510",
        version: "A.01/设计视图/EBOM",
        name: "部件,A.1(EBOM管理)",
        contextNo: draft.contextNo,
        contextName: draft.contextName,
        type: draft.type,
        qualifier: draft.qualifier,
        range: draft.range,
        addedAt: new Date().toISOString()
      },
      ...state.validityRows
    ];
    state.selectedRows.validityManagement = nextId;
  }

  state.validityDrawerOpen = false;
  state.validityEditingId = null;
  state.validityFormError = "";
  state.validityOpenSelect = null;
  state.checkedRows.validityManagement = new Set();
  return true;
}

function ensureTypeAttributeState() {
  if (!state.typeAttributeActiveTab) state.typeAttributeActiveTab = "extended";

  if (!state.typeAttributeRuleValues) state.typeAttributeRuleValues = {};
  typeAttributeRuleRows.forEach((row) => {
    const statusKey = `${row.id}:status`;
    if (!Object.prototype.hasOwnProperty.call(state.typeAttributeRuleValues, statusKey)) {
      state.typeAttributeRuleValues[statusKey] = row.status;
    }
    if (row.selectValue) {
      const selectKey = `${row.id}:${row.dataKind === "operatorInput" ? "operator" : "rangeFormat"}`;
      if (!Object.prototype.hasOwnProperty.call(state.typeAttributeRuleValues, selectKey)) {
        state.typeAttributeRuleValues[selectKey] = row.selectValue;
      }
    }
  });
}

function renderViewAttrField(label, value, options = {}) {
  const labelClass = `view-attr-label${options.required ? " required" : ""}`;
  const addon = options.addon || "";
  const isPlaceholder = value === "请输入" || value === "请选择";
  const controlValue = isPlaceholder ? "" : value;
  if (options.textarea) {
    return `
      <label class="view-attr-field full">
        <span class="${labelClass}">${escapeHtml(label)}</span>
        <span class="view-attr-textarea-wrap">
          <textarea class="view-attr-control view-attr-textarea" placeholder="${isPlaceholder ? escapeHtml(value) : ""}">${escapeHtml(controlValue)}</textarea>
          <span class="view-attr-counter">0 /200</span>
        </span>
        ${addon}
      </label>
    `;
  }

  if (options.select) {
    const fieldKey = options.fieldKey || label;
    const optionsKey = options.optionsKey || fieldKey;
    return `
      <label class="view-attr-field">
        <span class="${labelClass}">${escapeHtml(label)}</span>
        ${renderViewAttributeSelect(fieldKey, value, viewAttributeSelectOptions[optionsKey] || [value])}
      </label>
    `;
  }

  if (!options.readonly && !options.addon) {
    return `
      <label class="view-attr-field">
        <span class="${labelClass}">${escapeHtml(label)}</span>
        <input class="view-attr-control" type="text" value="${escapeHtml(controlValue)}" placeholder="${isPlaceholder ? escapeHtml(value) : ""}" />
      </label>
    `;
  }

  if (!options.readonly && options.addon) {
    return `
      <label class="view-attr-field">
        <span class="${labelClass}">${escapeHtml(label)}</span>
        <span class="view-attr-affix-control">
          <input class="view-attr-control" type="text" value="${escapeHtml(controlValue)}" placeholder="${isPlaceholder ? escapeHtml(value) : ""}" />
          <span class="view-attr-control-addon" aria-hidden="true">${addon}</span>
        </span>
      </label>
    `;
  }

  return `
    <label class="view-attr-field">
      <span class="${labelClass}">${escapeHtml(label)}</span>
      <span class="view-attr-control${options.readonly ? " disabled" : ""}${isPlaceholder ? " placeholder" : ""}"${options.readonly ? "" : ' tabindex="0"'}>
        <span class="table-name-text">${escapeHtml(value)}</span>
        ${addon}
      </span>
    </label>
  `;
}

function renderViewAttributeSelect(fieldKey, value, options) {
  const currentValue = state.viewAttributeFieldValues[fieldKey] || value;
  const isPlaceholder = currentValue === "请输入" || currentValue === "请选择";
  const isOpen = state.viewAttributeOpenSelect === fieldKey;
  return `
    <span class="view-attr-select${isOpen ? " open" : ""}">
      <button
        class="view-attr-control${isPlaceholder ? " placeholder" : ""}"
        type="button"
        data-action="toggle-view-attr-select"
        data-select-id="${escapeHtml(fieldKey)}"
      >
        <span class="view-attr-select-text">${escapeHtml(currentValue)}</span>
        ${dropdownArrow("view-attr-select-chevron")}

      ${
        isOpen
          ? `
            <span class="view-attr-select-menu" role="listbox">
              ${options
                .map(
                  (option) => `
                    <button
                      class="view-attr-select-option${option === currentValue ? " selected" : ""}"

                      role="option"
                      aria-selected="${option === currentValue ? "true" : "false"}"
                      data-action="choose-view-attr-option"

document.addEventListener("click", (event) => {
  const actionTarget = event.target.closest("[data-action]");
  if (!actionTarget) return;

  const { action } = actionTarget.dataset;

  if (action === "open-validity-drawer") {
    openValidityDrawer("add");
    render();
    return;
  }

  if (action === "edit-validity") {
    event.stopPropagation();
    openValidityDrawer("edit", Number(actionTarget.dataset.rowId));
    render();
    return;
  }

  if (action === "close-validity-drawer") {
    state.validityDrawerOpen = false;
    state.validityEditingId = null;
    state.validityFormError = "";
    state.validityOpenSelect = null;
    render();
    return;
  }

  if (action === "save-validity") {
    if (saveValidityDraft()) {
      render();
    } else {
      renderDrawerSlot();
    }
    return;
  }

  if (action === "delete-validity-selected") {
    if (state.checkedRows.validityManagement.size > 0) {
      state.deleteConfirm = { type: "validity" };
      state.validityDrawerOpen = false;
      render();
    }
    return;
  }

  if (action === "cancel-validity-delete") {
    state.validityDeleteDialogOpen = false;
    render();
    return;
  }

  if (action === "confirm-validity-delete") {
    const deletedIds = new Set(state.checkedRows.validityManagement);
    state.validityRows = state.validityRows.filter((row) => !deletedIds.has(row.id));
    state.checkedRows.validityManagement = new Set();
    if (deletedIds.has(state.selectedRows.validityManagement)) {
      state.selectedRows.validityManagement = null;
    }
    state.validityDeleteDialogOpen = false;
    render();
    return;
  }

  if (action === "sort-validity") {
    const sortKey = actionTarget.dataset.sortKey;
    if (state.validitySort.key === sortKey) {
      state.validitySort.order = state.validitySort.order === "asc" ? "desc" : "asc";
    } else {
      state.validitySort.key = sortKey;
      state.validitySort.order = "asc";
    }
    render();
    return;
  }

  if (action === "toggle-validity-select") {
    const field = actionTarget.dataset.validitySelectField;
    state.validityOpenSelect = state.validityOpenSelect === field ? null : field;
    renderDrawerSlot();
    return;
  }

  if (action === "choose-validity-option") {
    const field = actionTarget.dataset.validityField;
    const value = actionTarget.dataset.validityValue || "";
    state.validityDraft[field] = value;
    state.validityDraft = normalizeValidityDraft(state.validityDraft);
    state.validityFormError = "";
    state.validityOpenSelect = null;
    renderDrawerSlot();
    return;
  }

  if (action === "fill-validity-context") {
    const currentNo = state.validityDraft.contextNo.trim() || "CTX-1001";
    state.validityDraft.contextNo = currentNo;
    state.validityDraft.contextName = getValidityContextName(currentNo);
    if (state.validityDraft.type === "日期") {
      state.validityDraft.type = "批号";
    }
    renderDrawerSlot();
    return;
  }

});

function handleValidityFieldMutation(target) {
  const field = target.dataset.validityField;
  if (!field) return false;

  ensureValidityState();
  state.validityDraft[field] = target.value;
  state.validityDraft = normalizeValidityDraft(state.validityDraft);
  state.validityFormError = "";
  state.validityOpenSelect = null;
  renderDrawerSlot();
  return true;
}

document.addEventListener("input", (event) => {
  const batchField = event.target.dataset.batchField;
  if (batchField) {
    const rowIndex = Number(event.target.dataset.batchRow);
    const cellKey = `${rowIndex}:${batchField}`;
    state.batchPartValues[cellKey] = event.target.value;
    state.batchPartTouchedCells.add(cellKey);
    if (state.batchPartSubmitAttempted && event.target.value) {
      renderCache.drawer = "";
      renderBatchPartSlot();
    }
    return;
  }

  handleValidityFieldMutation(event.target);
});

document.addEventListener("change", (event) => {
  const batchField = event.target.dataset.batchField;
  if (batchField) {
    const rowIndex = Number(event.target.dataset.batchRow);
    const cellKey = `${rowIndex}:${batchField}`;
    state.batchPartValues[cellKey] = event.target.value;
    state.batchPartTouchedCells.add(cellKey);
    if (!event.target.matches("input")) {
      renderCache.drawer = "";
      renderBatchPartSlot();
    }
    return;
  }

  handleValidityFieldMutation(event.target);
});

document.addEventListener("focusout", (event) => {
  const batchField = event.target.dataset.batchField;
  if (!batchField) return;
  if (!event.target.matches("input")) return;

  const rowIndex = Number(event.target.dataset.batchRow);
  const cellKey = `${rowIndex}:${batchField}`;
  state.batchPartValues[cellKey] = event.target.value;
  state.batchPartTouchedCells.add(cellKey);
  if (event.relatedTarget && event.relatedTarget.closest(".batch-part-table")) {
    return;
  }
  renderCache.drawer = "";
  renderBatchPartSlot();
});

const documentDrawerSelectOptions = {
  docTypePrimary: ["类型一", "类型二", "类型三"],
  docTypeSecondary: ["类型一", "类型二", "类型三"]
};

function ensureDocumentDrawerState() {
  if (!state.documentDrawerDraft) {
    state.documentDrawerDraft = {
      docTypePrimary: "",
      docTypeSecondary: ""
    };
  }

  if (!Object.prototype.hasOwnProperty.call(state, "documentDrawerOpenSelect")) {
    state.documentDrawerOpenSelect = null;
  }
}

function resetDocumentDrawerState() {
  state.documentDrawerDraft = {
    docTypePrimary: "",
    docTypeSecondary: ""
  };
  state.documentDrawerOpenSelect = null;
}

function renderDocumentDrawerSelectField(label, fieldKey) {
  ensureDocumentDrawerState();
  const value = state.documentDrawerDraft[fieldKey] || "";
  const isOpen = state.documentDrawerOpenSelect === fieldKey;
  const options = documentDrawerSelectOptions[fieldKey] || [];

  return `
    <label class="document-drawer-field">
      <span class="document-drawer-field-label">${escapeHtml(label)}</span>
      <span class="document-drawer-select custom${isOpen ? " open" : ""}">
        <button
          class="document-drawer-select-trigger"
          type="button"
          data-action="toggle-doc-drawer-select"
          data-doc-drawer-select-field="${fieldKey}"
        >
          <span class="document-drawer-select-text${value ? "" : " placeholder"}">${escapeHtml(value || "请选择")}</span>
          ${dropdownArrow("drawer-select-chevron")}
        </button>
        ${
          isOpen
            ? `
              <span class="document-drawer-select-menu" role="listbox">
                ${options
                  .map(
                    (option) => `
                      <button
                        class="document-drawer-select-option${value === option ? " selected" : ""}"
                        type="button"
                        role="option"
                        aria-selected="${value === option ? "true" : "false"}"
                        data-action="choose-doc-drawer-option"
                        data-doc-drawer-field="${fieldKey}"
                        data-doc-drawer-value="${escapeHtml(option)}"
                      >
                        <span class="document-drawer-select-option-label">${escapeHtml(option)}</span>
                      </button>
                    `
                  )
                  .join("")}
              </span>
            `
            : ""
        }
      </span>
    </label>
  `;
}

function renderDocumentDrawerShell() {
  ensureDocumentDrawerState();
  return `

document.addEventListener("click", (event) => {
  ensureDocumentDrawerState();

  if (state.partMenuOpen && !event.target.closest(".part-split")) {
    state.partMenuOpen = false;
    renderCache.content = "";
    if (!event.target.closest("[data-action]")) {
      render();
      return;
    }
  }

  if (state.productManagementMoreMenuOpen && !event.target.closest(".product-management-more")) {
    state.productManagementMoreMenuOpen = false;
    renderCache.content = "";
    if (!event.target.closest("[data-action]")) {
      render();
      return;
    }
  }

  if (state.batchPartOpenSelect && !event.target.closest(".batch-inline-select")) {
    state.batchPartOpenSelect = null;
    if (document.activeElement && document.activeElement.closest(".batch-inline-select")) {
      document.activeElement.blur();
    }
    if (!event.target.closest("[data-action]")) {
      renderCache.drawer = "";
      renderBatchPartSlot();
      return;
    }
  }

  if (state.batchPartHeaderOpenSelect && !event.target.closest(".batch-part-select")) {
    state.batchPartHeaderOpenSelect = null;
    if (document.activeElement && document.activeElement.closest(".batch-part-select")) {
      document.activeElement.blur();
    }
    if (!event.target.closest("[data-action]")) {
      renderCache.drawer = "";
      renderBatchPartSlot();
      return;
    }
  }

  if (state.batchPartOpenPicker && !event.target.closest(".batch-picker-input")) {
    state.batchPartOpenPicker = null;
    if (document.activeElement && document.activeElement.closest(".batch-picker-input")) {
      document.activeElement.blur();
    }
    if (!event.target.closest("[data-action]")) {
      renderCache.drawer = "";
      renderBatchPartSlot();
      return;
    }
  }

  const clickedDocumentDrawerSelect = event.target.closest(".document-drawer-select.custom");
  if (state.documentDrawerOpenSelect && !clickedDocumentDrawerSelect) {
    state.documentDrawerOpenSelect = null;
    if (!event.target.closest("[data-action]")) {
      renderDrawerSlot();
      return;
    }
  }

  const actionTarget = event.target.closest("[data-action]");
  if (!actionTarget) return;

  const { action } = actionTarget.dataset;
  const setBatchSelectedRow = (rowIndex) => {
    if (!Number.isFinite(rowIndex)) return false;
    if (state.batchPartSelectedRow === rowIndex) return false;
    state.batchPartSelectedRow = rowIndex;
    return true;
  };
  const syncBatchCheckbox = (input) => {
    const rowIndex = Number(input.dataset.batchRow);
    if (!Number.isFinite(rowIndex)) return;
    if (input.checked) {
      state.batchPartCheckedRows.add(rowIndex);
    } else {
      state.batchPartCheckedRows.delete(rowIndex);
    }
  };

  if (action === "open-drawer") {
    resetDocumentDrawerState();
    state.drawerOpen = true;
    state.batchPartDialogOpen = false;
    state.partMenuOpen = false;
    state.productManagementMoreMenuOpen = false;
    renderCache.content = "";
    renderCache.drawer = "";
    render();
    return;
  }

  if (action === "close-drawer") {
    state.drawerOpen = false;
    resetDocumentDrawerState();
    renderCache.drawer = "";
    renderDrawerSlot();
    return;
  }

  if (action === "toggle-part-menu") {
    event.stopPropagation();
    state.partMenuOpen = !state.partMenuOpen;
    state.productManagementMoreMenuOpen = false;
    renderCache.content = "";
    render();
    return;
  }

  if (action === "toggle-product-management-more-menu") {
    event.stopPropagation();
    state.productManagementMoreMenuOpen = !state.productManagementMoreMenuOpen;
    state.partMenuOpen = false;
    renderCache.content = "";
    render();
    return;
  }

  if (action === "product-management-more-command") {
    event.stopPropagation();
    state.productManagementMoreMenuOpen = false;
    renderCache.content = "";
    render();
    return;
  }

  if (action === "open-batch-part-dialog") {
    state.partMenuOpen = false;
    state.productManagementMoreMenuOpen = false;
    state.drawerOpen = false;
    state.validityDrawerOpen = false;
    state.validityDeleteDialogOpen = false;
    state.batchPartDialogOpen = true;
    state.batchPartHeaderOpenSelect = null;
    renderCache.content = "";
    renderCache.drawer = "";
    render();
    return;
  }

  if (action === "close-batch-part-dialog") {
    state.batchPartDialogOpen = false;
    state.batchPartSubmitAttempted = false;
    state.batchPartHeaderOpenSelect = null;
    state.batchPartOpenSelect = null;
    state.batchPartOpenPicker = null;
    renderCache.drawer = "";
    renderDrawerSlot();
    return;
  }

  if (action === "submit-batch-part-dialog") {
    state.batchPartSubmitAttempted = true;
    renderCache.drawer = "";
    renderDrawerSlot();
    return;
  }

  if (action === "toggle-batch-part-header-select") {
    event.stopPropagation();
    event.preventDefault();
    const field = actionTarget.dataset.batchPartHeaderField;
    const willClose = state.batchPartHeaderOpenSelect === field;
    state.batchPartHeaderOpenSelect = willClose ? null : field;
    state.batchPartOpenSelect = null;
    state.batchPartOpenPicker = null;
    if (willClose) {
      actionTarget.blur();
    }
    renderCache.drawer = "";
    renderBatchPartSlot();
    return;
  }

  if (action === "choose-batch-part-header-option") {
    event.stopPropagation();
    event.preventDefault();
    const field = actionTarget.dataset.batchPartHeaderField;
    const value = actionTarget.dataset.batchPartHeaderValue || "";
    state.batchPartHeaderValues[field] = value;
    state.batchPartHeaderOpenSelect = null;
    actionTarget.blur();
    renderCache.drawer = "";
    renderBatchPartSlot();
    return;
  }

  if (action === "toggle-batch-part-checkbox") {
    event.stopPropagation();
    syncBatchCheckbox(actionTarget);
    renderCache.drawer = "";
    renderBatchPartSlot();
    return;
  }

  if (action === "toggle-batch-part-all") {
    event.stopPropagation();
    const rows = getBatchPartRows();
    state.batchPartCheckedRows = actionTarget.checked ? new Set(rows) : new Set();
    renderCache.drawer = "";
    renderBatchPartSlot();
    return;
  }

  if (action === "delete-batch-part-selected") {
    event.stopPropagation();
    if (state.batchPartCheckedRows.size === 0) return;
    state.deleteConfirm = { type: "batchPart" };
    renderCache.drawer = "";
    renderBatchPartSlot();
    return;
  }

  if (action === "select-batch-part-row") {
    const nextRow = Number(actionTarget.dataset.batchRow);
    const clickedEditorControl = event.target.closest(".batch-cell-editor input, .batch-cell-editor button");
    if (clickedEditorControl) {
      if (setBatchSelectedRow(nextRow)) {
        syncBatchPartSelectedRow();
      }
      return;
    }
    if (setBatchSelectedRow(nextRow)) {
      renderCache.drawer = "";
      renderBatchPartSlot();
    }
    return;
  }

  if (action === "toggle-batch-cell-select") {
    event.stopPropagation();
    event.preventDefault();
    const rowIndex = Number(actionTarget.dataset.batchRow);
    setBatchSelectedRow(rowIndex);
    const field = actionTarget.dataset.batchField;
    const cellKey = `${rowIndex}:${field}`;
    const willClose = state.batchPartOpenSelect === cellKey;
    state.batchPartOpenSelect = willClose ? null : cellKey;
    state.batchPartOpenPicker = null;
    state.batchPartHeaderOpenSelect = null;
    if (willClose) {
      actionTarget.blur();
    }
    renderCache.drawer = "";
    renderBatchPartSlot();
    return;
  }

  if (action === "toggle-batch-cell-date") {
    event.stopPropagation();
    event.preventDefault();
    const rowIndex = Number(actionTarget.dataset.batchRow);
    setBatchSelectedRow(rowIndex);
    const field = actionTarget.dataset.batchField;
    const cellKey = `${rowIndex}:${field}`;
    const willClose = state.batchPartOpenPicker === cellKey;
    state.batchPartOpenPicker = willClose ? null : cellKey;
    state.batchPartOpenSelect = null;
    state.batchPartHeaderOpenSelect = null;
    if (willClose) {
      actionTarget.blur();
    }
    renderCache.drawer = "";
    renderBatchPartSlot();
    return;
  }

  if (action === "choose-batch-cell-date") {
    event.stopPropagation();
    event.preventDefault();
    const rowIndex = Number(actionTarget.dataset.batchRow);
    setBatchSelectedRow(rowIndex);
    const field = actionTarget.dataset.batchField;
    const value = actionTarget.dataset.batchValue || "";
    const cellKey = `${rowIndex}:${field}`;
    const column = batchPartColumns.find((item) => item.key === field) || { key: field };
    if (getBatchPartValue(rowIndex, column) !== value) {
      state.batchPartValues[cellKey] = value;
      state.batchPartTouchedCells.add(cellKey);
    }
    state.batchPartOpenPicker = null;
    actionTarget.blur();
    renderCache.drawer = "";
    renderBatchPartSlot();
    return;
  }

  if (action === "choose-batch-cell-option") {
    event.stopPropagation();
    event.preventDefault();
    const rowIndex = Number(actionTarget.dataset.batchRow);
    setBatchSelectedRow(rowIndex);
    const field = actionTarget.dataset.batchField;
    const value = actionTarget.dataset.batchValue || "";
    const cellKey = `${rowIndex}:${field}`;
    const column = batchPartColumns.find((item) => item.key === field) || { key: field };
    if (getBatchPartValue(rowIndex, column) !== value) {
      state.batchPartValues[cellKey] = value;
      state.batchPartTouchedCells.add(cellKey);
    }
    state.batchPartOpenSelect = null;
    actionTarget.blur();
    renderCache.drawer = "";
    renderBatchPartSlot();
    return;
  }

  if (action === "toggle-doc-drawer-select") {
    const field = actionTarget.dataset.docDrawerSelectField;
    state.documentDrawerOpenSelect = state.documentDrawerOpenSelect === field ? null : field;
    renderDrawerSlot();
    return;
  }

  if (action === "choose-doc-drawer-option") {
    const field = actionTarget.dataset.docDrawerField;
    const value = actionTarget.dataset.docDrawerValue || "";
    state.documentDrawerDraft[field] = value;
    state.documentDrawerOpenSelect = null;
    renderDrawerSlot();
  }
});

function findPhmNode(nodes, nodeId) {
  for (const node of nodes) {
    if (node.id === nodeId) return node;
    if (node.children) {
      const match = findPhmNode(node.children, nodeId);
      if (match) return match;
    }
  }
  return null;
}

function collectPhmNodeIds(node, bag) {
  bag.add(node.id);
  (node.children || []).forEach((child) => collectPhmNodeIds(child, bag));
  return bag;
}

function getPhmTreeState(pageId) {
  return state.phmPageTrees[pageId];
}

function getPhmTreeFilterIds(tree, pageId) {
  const target = findPhmNode(tree, getPhmTreeState(pageId).selected);
  return target ? collectPhmNodeIds(target, new Set()) : new Set();
}

function getPhmFilteredRows(pageId) {
  let rows = phmRows[pageId] || [];

  if (pageId === "parameterLibrary") {
    const filters = getPhmTreeFilterIds(phmParameterTree, pageId);
    rows = phmRows.parameterLibrary.filter((row) => filters.has("param-root") || filters.has(row.categoryId));
    return filterDeletedRows(pageId, rows);
  }

  if (pageId === "galleryLibrary") {
    const filters = getPhmTreeFilterIds(phmGalleryTree, pageId);
    rows = phmRows.galleryLibrary.filter((row) => filters.has("asset-root") || filters.has(row.categoryId));
    return filterDeletedRows(pageId, rows);
  }

  return filterDeletedRows(pageId, rows);
}

function renderPhmOverlayFields(fields, options = {}) {
  const useSingleColumn = options.columns === 1;

    .map((field) => {

      const currentColumn = isTextarea ? null : useSingleColumn ? 0 : columnIndex;
      if (!isTextarea) {

      } else {

      const columnAttr = currentColumn === null ? "" : ` data-overlay-column="${currentColumn}"`;

}

function updateWorkTabsArrows(slot) {
  if (!slot) return;
  const viewport = slot.querySelector(".work-tabs-viewport");
  const leftArrow = slot.querySelector("[data-action='scroll-work-tabs-left']");
  const rightArrow = slot.querySelector("[data-action='scroll-work-tabs-right']");
  if (!viewport || !leftArrow || !rightArrow) return;
  const canScroll = viewport.scrollWidth > viewport.clientWidth + 1;
  leftArrow.classList.toggle("hidden", !canScroll || viewport.scrollLeft <= 4);
  rightArrow.classList.toggle("hidden", !canScroll || viewport.scrollLeft + viewport.clientWidth >= viewport.scrollWidth - 4);
}

function enhanceWorkTabsSlot() {
  const slot = app.querySelector("[data-slot='work-tabs']");
  if (!slot || slot.querySelector(".work-tabs-viewport")) {
    if (slot) updateWorkTabsArrows(slot);
    return;
  }
  const tabsMarkup = Array.from(slot.children).map((node) => node.outerHTML).join("");
  slot.innerHTML = `<button class="work-tabs-scroll-arrow hidden" type="button" data-action="scroll-work-tabs-left">${icon("pageLeft", "icon-12")}</button><div class="work-tabs-viewport"><div class="work-tabs-track">${tabsMarkup}</div></div><button class="work-tabs-scroll-arrow hidden" type="button" data-action="scroll-work-tabs-right">${icon("pageRight", "icon-12")}</button>`;
  const viewport = slot.querySelector(".work-tabs-viewport");
  viewport.scrollLeft = state.workTabsScrollLeft || 0;
  viewport.addEventListener("scroll", () => {
    state.workTabsScrollLeft = viewport.scrollLeft;
    updateWorkTabsArrows(slot);
  });
  updateWorkTabsArrows(slot);
}

function syncInlineFormLabelWidths() {
  document.querySelectorAll(".phm-overlay-grid").forEach((grid) => {
    grid.style.removeProperty("--phm-overlay-col-1-label-width");
    grid.style.removeProperty("--phm-overlay-col-2-label-width");

    [0, 1].forEach((column) => {
      const labels = Array.from(grid.querySelectorAll(`.phm-overlay-field[data-overlay-column="${column}"] .phm-overlay-label`));
      if (!labels.length) return;
      const width = Math.max(...labels.map((label) => Math.ceil(label.getBoundingClientRect().width)));
      grid.style.setProperty(`--phm-overlay-col-${column + 1}-label-width`, `${width}px`);
    });
  });

  document.querySelectorAll(".document-drawer-field-grid").forEach((grid) => {
    grid.style.removeProperty("--document-drawer-col-1-label-width");
    grid.style.removeProperty("--document-drawer-col-2-label-width");

    const labels = Array.from(grid.querySelectorAll(".document-drawer-field-label"));
    const columnWidths = [0, 0];

    labels.forEach((label, index) => {
      const column = index % 2;
      columnWidths[column] = Math.max(columnWidths[column], Math.ceil(label.getBoundingClientRect().width));
    });

    columnWidths.forEach((width, index) => {
      if (width > 0) {
        grid.style.setProperty(`--document-drawer-col-${index + 1}-label-width`, `${width}px`);
      }
    });
  });

  document.querySelectorAll(".validity-field-grid").forEach((grid) => {
    grid.style.removeProperty("--validity-col-1-label-width");
    const labels = Array.from(grid.querySelectorAll(".validity-field-label"));
    if (!labels.length) return;
    const width = Math.max(...labels.map((label) => Math.ceil(label.getBoundingClientRect().width)));
    grid.style.setProperty("--validity-col-1-label-width", `${width}px`);
  });
}

document.addEventListener("click", (event) => {
  const actionTarget = event.target.closest("[data-action]");
  if (!actionTarget) return;
  const action = actionTarget.dataset.action;
  if (action === "phm-toggle-tree") {
    const { pageId, nodeId } = actionTarget.dataset;
    const treeState = state.phmPageTrees?.[pageId];
    if (!treeState) return;
    if (treeState.open.has(nodeId)) {
      treeState.open.delete(nodeId);
    } else {
      treeState.open.add(nodeId);
    }
    render();
    return;
  }
  if (action === "phm-select-tree-node") {
    const { pageId, nodeId } = actionTarget.dataset;
    const treeState = state.phmPageTrees?.[pageId];
    if (!treeState) return;
    treeState.selected = nodeId;
    render();
    return;
  }
  if (action === "phm-switch-gallery") {
    state.phmGalleryDisplay = actionTarget.dataset.view || "card";
    render();
    return;
  }
  if (action === "phm-select-media") {
    state.phmSelectedMediaId = Number(actionTarget.dataset.mediaId);
    state.selectedRows.galleryLibrary = state.phmSelectedMediaId;
    render();
    return;
  }
  if (action === "phm-select-media-row") {
    state.phmSelectedMediaId = Number(actionTarget.dataset.rowId);
    render();
    return;
  }
  if (action === "phm-select-structure-item") {
    const { pageId, itemId } = actionTarget.dataset;
    const pageState = state.phmStructure?.[pageId];
    const source = phmStructureData?.[pageId];
    if (!pageState || !source) return;
    pageState.itemId = itemId;
    const firstNode = (source.nodes[itemId] || [])[0];
    pageState.nodeId = firstNode ? firstNode.id : null;
    pageState.tab = "detail";
    render();
    return;
  }
  if (action === "phm-select-structure-node") {
    const { pageId, nodeId } = actionTarget.dataset;
    const pageState = state.phmStructure?.[pageId];
    if (!pageState) return;
    pageState.nodeId = nodeId;
    render();
    return;
  }
  if (action === "phm-switch-structure-tab") {
    const { pageId, tab } = actionTarget.dataset;
    const pageState = state.phmStructure?.[pageId];
    if (!pageState) return;
    pageState.tab = tab || "detail";
    render();
    return;
  }
  if (action === "open-phm-overlay") {
    state.phmOverlay = actionTarget.dataset.view;
    renderDrawerSlot();
    return;
  }
  if (action === "close-phm-overlay") {
    state.phmOverlay = null;
    renderDrawerSlot();
    return;
  }
  if (action === "scroll-work-tabs-left" || action === "scroll-work-tabs-right") {
    const slot = app.querySelector("[data-slot='work-tabs']");
    const viewport = slot ? slot.querySelector(".work-tabs-viewport") : null;
    if (!viewport) return;
    viewport.scrollBy({ left: action === "scroll-work-tabs-left" ? -180 : 180, behavior: "smooth" });
  }
});
