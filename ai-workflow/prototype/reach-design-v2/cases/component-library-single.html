        e(RzFormDemo, { overlay: true })
      )
    );
  }

  function ModalPreview() {
    const [open, setOpen] = React.useState(false);
    return e(React.Fragment, null, e(Button, { type: "primary", onClick: () => setOpen(true) }, "打开对话框"), e(Modal, { title: "确认发布", open, onCancel: () => setOpen(false), onOk: () => setOpen(false) }, "发布后将同步到组件展示页。"));
  }

  function menuItems() {
    return [{ key: "edit", label: "编辑" }, { key: "copy", label: "复制" }, { key: "delete", label: "删除" }];
  }
  root.render(e(AppRoot));
})();
